<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="font-family: Inter, system-ui, sans-serif;">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 600; fill: #1e1e1e; }
      .box-title { font-size: 14px; font-weight: 600; }
      .box-subtitle { font-size: 11px; fill: #1e1e1e; }
      .box-detail { font-size: 10px; fill: #666666; }
      .box-items { font-size: 10px; fill: #666666; }
      .workstream-title { font-size: 13px; font-weight: 600; }
      .workstream-label { font-size: 9px; fill: #1e1e1e; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" class="title" text-anchor="middle">Governance Structure</text>

  <!-- Steering Committee -->
  <rect x="150" y="55" width="500" height="85" rx="8" fill="#22d3ee15" stroke="#22d3ee" stroke-width="3"/>
  <text x="400" y="80" class="box-title" fill="#22d3ee" text-anchor="middle">STEERING COMMITTEE</text>
  <text x="400" y="100" class="box-subtitle" text-anchor="middle">Commerce.com SVP (Sponsor)  +  WPEngine VP (Partner Sponsor)</text>
  <text x="400" y="120" class="box-detail" text-anchor="middle">Meets: Bi-weekly  |  Decisions: Go/No-Go, Budget, Partnership</text>

  <!-- Arrow to Tiger Team Lead -->
  <path d="M400 140 L400 170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Tiger Team Lead -->
  <rect x="200" y="180" width="400" height="75" rx="8" fill="#f9731615" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="205" class="box-title" fill="#f97316" text-anchor="middle">TIGER TEAM LEAD</text>
  <text x="400" y="225" class="box-detail" text-anchor="middle">Accountable for: Day-to-day execution, risk escalation</text>
  <text x="400" y="242" class="box-detail" text-anchor="middle">Reports: Weekly to Steering Committee</text>

  <!-- Arrows to workstreams -->
  <path d="M300 255 L150 295" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 255 L400 295" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M500 255 L650 295" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Product Workstream -->
  <rect x="60" y="305" width="180" height="140" rx="8" fill="#a855f715" stroke="#a855f7" stroke-width="2"/>
  <text x="150" y="330" class="workstream-title" fill="#a855f7" text-anchor="middle">PRODUCT</text>
  <text x="150" y="350" class="workstream-label" text-anchor="middle">Workstream</text>
  <text x="80" y="380" class="box-items">
    <tspan x="80" dy="0">- Catalyst</tspan>
    <tspan x="80" dy="16">- Makeswift</tspan>
    <tspan x="80" dy="16">- UX</tspan>
  </text>

  <!-- Engineering Workstream -->
  <rect x="310" y="305" width="180" height="140" rx="8" fill="#22c55e15" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="330" class="workstream-title" fill="#22c55e" text-anchor="middle">ENGINEERING</text>
  <text x="400" y="350" class="workstream-label" text-anchor="middle">Workstream</text>
  <text x="330" y="380" class="box-items">
    <tspan x="330" dy="0">- Integration</tspan>
    <tspan x="330" dy="16">- Feedonomics</tspan>
    <tspan x="330" dy="16">- DevOps</tspan>
  </text>

  <!-- Partnerships Workstream -->
  <rect x="560" y="305" width="180" height="140" rx="8" fill="#eab30815" stroke="#eab308" stroke-width="2"/>
  <text x="650" y="330" class="workstream-title" fill="#eab308" text-anchor="middle">PARTNERSHIPS</text>
  <text x="650" y="350" class="workstream-label" text-anchor="middle">Workstream</text>
  <text x="580" y="380" class="box-items">
    <tspan x="580" dy="0">- WPEngine</tspan>
    <tspan x="580" dy="16">- SI Partners</tspan>
    <tspan x="580" dy="16">- Pilots</tspan>
  </text>
</svg>
