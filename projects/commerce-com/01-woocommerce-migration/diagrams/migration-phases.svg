<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" style="font-family: Inter, system-ui, sans-serif;">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: 600; fill: #1e1e1e; }
      .phase-title { font-size: 14px; font-weight: 600; }
      .phase-subtitle { font-size: 11px; fill: #1e1e1e; }
      .phase-weeks { font-size: 9px; fill: #666666; }
      .phase-items { font-size: 9px; fill: #1e1e1e; }
      .gate-text { font-size: 8px; }
    </style>
  </defs>

  <!-- Title -->
  <text x="640" y="30" class="title" text-anchor="middle">Universal Migration Phases</text>

  <!-- Phase 0 -->
  <rect x="50" y="50" width="180" height="170" rx="8" fill="#22d3ee15" stroke="#22d3ee" stroke-width="2"/>
  <text x="140" y="75" class="phase-title" fill="#22d3ee" text-anchor="middle">PHASE 0</text>
  <text x="140" y="95" class="phase-subtitle" text-anchor="middle">Discovery &amp; Decision</text>
  <text x="140" y="112" class="phase-weeks" text-anchor="middle">Weeks 1-2</text>
  <text x="60" y="135" class="phase-items">
    <tspan x="60" dy="0">- Readiness Assessment</tspan>
    <tspan x="60" dy="14">- Data Complexity Scoring</tspan>
    <tspan x="60" dy="14">- Integration Inventory</tspan>
    <tspan x="60" dy="14">- Platform Recommendation</tspan>
  </text>
  <polygon points="140,230 155,255 125,255" fill="#f9731620" stroke="#f97316" stroke-width="2"/>
  <text x="140" y="275" class="gate-text" fill="#f97316" text-anchor="middle">Gate: Decision</text>

  <!-- Arrow 0->1 -->
  <path d="M230 135 L250 135" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 1 -->
  <rect x="250" y="50" width="180" height="170" rx="8" fill="#22d3ee15" stroke="#22d3ee" stroke-width="2"/>
  <text x="340" y="75" class="phase-title" fill="#22d3ee" text-anchor="middle">PHASE 1</text>
  <text x="340" y="95" class="phase-subtitle" text-anchor="middle">Architecture &amp; Design</text>
  <text x="340" y="112" class="phase-weeks" text-anchor="middle">Weeks 3-6</text>
  <text x="260" y="135" class="phase-items">
    <tspan x="260" dy="0">- Platform setup</tspan>
    <tspan x="260" dy="14">- Theme/frontend selection</tspan>
    <tspan x="260" dy="14">- URL redirect matrix</tspan>
    <tspan x="260" dy="14">- Integration architecture</tspan>
  </text>
  <polygon points="340,230 355,255 325,255" fill="#f9731620" stroke="#f97316" stroke-width="2"/>
  <text x="340" y="275" class="gate-text" fill="#f97316" text-anchor="middle">Gate: Design OK</text>

  <!-- Arrow 1->2 -->
  <path d="M430 135 L450 135" stroke="#94a3b8" stroke-width="2"/>

  <!-- Phase 2 -->
  <rect x="450" y="50" width="180" height="170" rx="8" fill="#22d3ee15" stroke="#22d3ee" stroke-width="2"/>
  <text x="540" y="75" class="phase-title" fill="#22d3ee" text-anchor="middle">PHASE 2</text>
  <text x="540" y="95" class="phase-subtitle" text-anchor="middle">Data Migration</text>
  <text x="540" y="112" class="phase-weeks" text-anchor="middle">Weeks 7-10</text>
  <text x="460" y="135" class="phase-items">
    <tspan x="460" dy="0">- Data cleansing</tspan>
    <tspan x="460" dy="14">- ETL execution</tspan>
    <tspan x="460" dy="14">- Validation framework</tspan>
    <tspan x="460" dy="14">- Delta sync preparation</tspan>
  </text>
  <polygon points="540,230 555,255 525,255" fill="#f9731620" stroke="#f97316" stroke-width="2"/>
  <text x="540" y="275" class="gate-text" fill="#f97316" text-anchor="middle">Gate: Data Verified</text>

  <!-- Arrow 2->3 -->
  <path d="M630 135 L650 135" stroke="#94a3b8" stroke-width="2"/>

  <!-- Phase 3 -->
  <rect x="650" y="50" width="180" height="170" rx="8" fill="#22d3ee15" stroke="#22d3ee" stroke-width="2"/>
  <text x="740" y="75" class="phase-title" fill="#22d3ee" text-anchor="middle">PHASE 3</text>
  <text x="740" y="95" class="phase-subtitle" text-anchor="middle">Integration &amp; Testing</text>
  <text x="740" y="112" class="phase-weeks" text-anchor="middle">Weeks 11-14</text>
  <text x="660" y="135" class="phase-items">
    <tspan x="660" dy="0">- ERP/OMS reconnection</tspan>
    <tspan x="660" dy="14">- Payment gateway setup</tspan>
    <tspan x="660" dy="14">- UAT execution</tspan>
    <tspan x="660" dy="14">- Performance testing</tspan>
  </text>
  <polygon points="740,230 755,255 725,255" fill="#f9731620" stroke="#f97316" stroke-width="2"/>
  <text x="740" y="275" class="gate-text" fill="#f97316" text-anchor="middle">Gate: Acceptance</text>

  <!-- Arrow 3->4 -->
  <path d="M830 135 L850 135" stroke="#94a3b8" stroke-width="2"/>

  <!-- Phase 4 -->
  <rect x="850" y="50" width="180" height="170" rx="8" fill="#22d3ee15" stroke="#22d3ee" stroke-width="2"/>
  <text x="940" y="75" class="phase-title" fill="#22d3ee" text-anchor="middle">PHASE 4</text>
  <text x="940" y="95" class="phase-subtitle" text-anchor="middle">Cutover &amp; Stabilization</text>
  <text x="940" y="112" class="phase-weeks" text-anchor="middle">Weeks 15-16</text>
  <text x="860" y="135" class="phase-items">
    <tspan x="860" dy="0">- DNS migration</tspan>
    <tspan x="860" dy="14">- Final delta sync</tspan>
    <tspan x="860" dy="14">- Customer activation</tspan>
    <tspan x="860" dy="14">- SEO monitoring</tspan>
  </text>
  <polygon points="940,230 955,255 925,255" fill="#22c55e20" stroke="#22c55e" stroke-width="2"/>
  <text x="940" y="275" class="gate-text" fill="#22c55e" text-anchor="middle">Gate: Go-Live</text>

  <!-- Arrow 4->5 -->
  <path d="M1030 135 L1050 135" stroke="#94a3b8" stroke-width="2"/>

  <!-- Phase 5 -->
  <rect x="1050" y="50" width="180" height="170" rx="8" fill="#22c55e15" stroke="#22c55e" stroke-width="2"/>
  <text x="1140" y="75" class="phase-title" fill="#22c55e" text-anchor="middle">PHASE 5</text>
  <text x="1140" y="95" class="phase-subtitle" text-anchor="middle">Optimization</text>
  <text x="1140" y="112" class="phase-weeks" text-anchor="middle">Weeks 17-20</text>
  <text x="1060" y="135" class="phase-items">
    <tspan x="1060" dy="0">- Performance tuning</tspan>
    <tspan x="1060" dy="14">- Conversion optimization</tspan>
    <tspan x="1060" dy="14">- Operational handoff</tspan>
    <tspan x="1060" dy="14">- Hypercare transition</tspan>
  </text>
</svg>
