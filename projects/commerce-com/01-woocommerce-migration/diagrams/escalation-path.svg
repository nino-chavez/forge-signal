<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" style="font-family: Inter, system-ui, sans-serif;">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 600; fill: #1e1e1e; }
      .box-title { font-size: 13px; font-weight: 600; }
      .box-detail { font-size: 10px; fill: #666666; }
      .resolved { font-size: 11px; fill: #22c55e; }
      .unresolved { font-size: 10px; fill: #ef4444; }
      .doc { font-size: 9px; fill: #666666; }
    </style>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="30" class="title" text-anchor="middle">Escalation Path</text>

  <!-- Issue Identified -->
  <rect x="200" y="55" width="200" height="45" rx="8" fill="#ef444415" stroke="#ef4444" stroke-width="2"/>
  <text x="300" y="83" class="box-title" fill="#ef4444" text-anchor="middle">Issue Identified</text>

  <!-- Arrow to Tiger Team Lead -->
  <path d="M300 100 L300 130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Tiger Team Lead -->
  <rect x="150" y="140" width="300" height="65" rx="8" fill="#f9731615" stroke="#f97316" stroke-width="2"/>
  <text x="300" y="168" class="box-title" fill="#f97316" text-anchor="middle">Tiger Team Lead</text>
  <text x="300" y="188" class="box-detail" text-anchor="middle">24h resolution target</text>

  <!-- Resolved path 1 -->
  <path d="M450 172 L490 172" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="500" y="152" width="100" height="40" rx="6" fill="#22c55e15" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="177" class="resolved" text-anchor="middle">Resolved</text>
  <path d="M600 172 L620 172" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <rect x="630" y="157" width="60" height="30" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="660" y="177" class="doc" text-anchor="middle">Document</text>

  <!-- Unresolved path 1 -->
  <path d="M300 205 L300 245" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="320" y="230" class="unresolved">Unresolved</text>

  <!-- Executive Sponsor -->
  <rect x="150" y="255" width="300" height="65" rx="8" fill="#22d3ee15" stroke="#22d3ee" stroke-width="2"/>
  <text x="300" y="283" class="box-title" fill="#22d3ee" text-anchor="middle">Executive Sponsor</text>
  <text x="300" y="303" class="box-detail" text-anchor="middle">48h resolution target</text>

  <!-- Resolved path 2 -->
  <path d="M450 287 L490 287" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="500" y="267" width="100" height="40" rx="6" fill="#22c55e15" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="292" class="resolved" text-anchor="middle">Resolved</text>
  <path d="M600 287 L620 287" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <rect x="630" y="272" width="60" height="30" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="660" y="292" class="doc" text-anchor="middle">Document</text>

  <!-- Unresolved path 2 -->
  <path d="M300 320 L300 360" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="320" y="345" class="unresolved">Unresolved</text>

  <!-- Steering Committee -->
  <rect x="150" y="370" width="300" height="55" rx="8" fill="#a855f715" stroke="#a855f7" stroke-width="3"/>
  <text x="300" y="403" class="box-title" fill="#a855f7" text-anchor="middle">Steering Committee</text>
</svg>
