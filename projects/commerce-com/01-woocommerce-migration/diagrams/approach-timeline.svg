<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" style="font-family: Inter, system-ui, sans-serif;">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 600; fill: #1e1e1e; }
      .week-title { font-size: 13px; font-weight: 600; }
      .week-subtitle { font-size: 10px; fill: #1e1e1e; }
      .week-items { font-size: 9px; fill: #666666; }
      .legend { font-size: 9px; fill: #666666; }
    </style>
  </defs>

  <!-- Title -->
  <text x="490" y="25" class="title" text-anchor="middle">WPEngine Partnership Approach</text>

  <!-- Timeline line -->
  <line x1="50" y1="55" x2="930" y2="55" stroke="#94a3b8" stroke-width="3"/>

  <!-- Week 1 -->
  <circle cx="80" cy="55" r="8" fill="#22d3ee"/>
  <rect x="30" y="75" width="150" height="130" rx="6" fill="#22d3ee10" stroke="#22d3ee" stroke-width="2"/>
  <text x="105" y="95" class="week-title" fill="#22d3ee" text-anchor="middle">WEEK 1</text>
  <text x="105" y="112" class="week-subtitle" text-anchor="middle">Intelligence Gathering</text>
  <text x="40" y="132" class="week-items">
    <tspan x="40" dy="0">- Due diligence checklist</tspan>
    <tspan x="40" dy="14">- Identify 2-3 SI partners</tspan>
    <tspan x="40" dy="14">- Prepare partnership</tspan>
    <tspan x="40" dy="14">  one-pager</tspan>
  </text>

  <!-- Week 2 -->
  <circle cx="230" cy="55" r="8" fill="#22d3ee"/>
  <rect x="180" y="75" width="150" height="130" rx="6" fill="#22d3ee10" stroke="#22d3ee" stroke-width="2"/>
  <text x="255" y="95" class="week-title" fill="#22d3ee" text-anchor="middle">WEEK 2</text>
  <text x="255" y="112" class="week-subtitle" text-anchor="middle">SI Partner Outreach</text>
  <text x="190" y="132" class="week-items">
    <tspan x="190" dy="0">- Contact priority SI</tspan>
    <tspan x="190" dy="14">- Share opportunity brief</tspan>
    <tspan x="190" dy="14">- Request introduction</tspan>
    <tspan x="190" dy="14">  facilitation</tspan>
  </text>

  <!-- Weeks 3-4 -->
  <circle cx="380" cy="55" r="8" fill="#f97316"/>
  <rect x="330" y="75" width="150" height="130" rx="6" fill="#f9731610" stroke="#f97316" stroke-width="2"/>
  <text x="405" y="95" class="week-title" fill="#f97316" text-anchor="middle">WEEKS 3-4</text>
  <text x="405" y="112" class="week-subtitle" text-anchor="middle">WPEngine Contact</text>
  <text x="340" y="132" class="week-items">
    <tspan x="340" dy="0">- SI facilitates intro</tspan>
    <tspan x="340" dy="14">- Initial call: understand</tspan>
    <tspan x="340" dy="14">  WooCommerce pain</tspan>
    <tspan x="340" dy="14">- Share high-level concept</tspan>
  </text>

  <!-- Weeks 5-6 -->
  <circle cx="530" cy="55" r="8" fill="#f97316"/>
  <rect x="480" y="75" width="150" height="130" rx="6" fill="#f9731610" stroke="#f97316" stroke-width="2"/>
  <text x="555" y="95" class="week-title" fill="#f97316" text-anchor="middle">WEEKS 5-6</text>
  <text x="555" y="112" class="week-subtitle" text-anchor="middle">Exploration</text>
  <text x="490" y="132" class="week-items">
    <tspan x="490" dy="0">- Technical discovery</tspan>
    <tspan x="490" dy="14">  (Atlas, integrations)</tspan>
    <tspan x="490" dy="14">- Customer Success align</tspan>
    <tspan x="490" dy="14">- Interest assessment</tspan>
  </text>

  <!-- Weeks 7-8 -->
  <circle cx="680" cy="55" r="8" fill="#a855f7"/>
  <rect x="630" y="75" width="150" height="130" rx="6" fill="#a855f710" stroke="#a855f7" stroke-width="2"/>
  <text x="705" y="95" class="week-title" fill="#a855f7" text-anchor="middle">WEEKS 7-8</text>
  <text x="705" y="112" class="week-subtitle" text-anchor="middle">Pilot Proposal</text>
  <text x="640" y="132" class="week-items">
    <tspan x="640" dy="0">- Formal pilot proposal</tspan>
    <tspan x="640" dy="14">  (3 merchants, 3 months)</tspan>
    <tspan x="640" dy="14">- Define success metrics</tspan>
    <tspan x="640" dy="14">- Agree stealth criteria</tspan>
  </text>

  <!-- Week 9+ -->
  <circle cx="830" cy="55" r="8" fill="#22c55e"/>
  <rect x="780" y="75" width="150" height="130" rx="6" fill="#22c55e10" stroke="#22c55e" stroke-width="2"/>
  <text x="855" y="95" class="week-title" fill="#22c55e" text-anchor="middle">WEEK 9+</text>
  <text x="855" y="112" class="week-subtitle" text-anchor="middle">Phase 0 Execution</text>
  <text x="855" y="145" class="week-items" text-anchor="middle">
    <tspan x="855" dy="0">Covered in</tspan>
    <tspan x="855" dy="14">Tiger Team GTM</tspan>
    <tspan x="855" dy="14">document</tspan>
    <tspan x="855" dy="22">Phase 0: 12 weeks</tspan>
  </text>

  <!-- Legend -->
  <text x="50" y="230" class="legend">Phase:</text>
  <circle cx="100" cy="227" r="6" fill="#22d3ee"/>
  <text x="112" y="230" class="legend">Preparation</text>
  <circle cx="190" cy="227" r="6" fill="#f97316"/>
  <text x="202" y="230" class="legend">Engagement</text>
  <circle cx="290" cy="227" r="6" fill="#a855f7"/>
  <text x="302" y="230" class="legend">Proposal</text>
  <circle cx="370" cy="227" r="6" fill="#22c55e"/>
  <text x="382" y="230" class="legend">Execution</text>
</svg>
