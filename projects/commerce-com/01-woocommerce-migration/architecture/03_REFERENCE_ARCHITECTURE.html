<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commerce.com + WordPress Reference Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-shopify: #96bf48;
            --color-bigcommerce: #34313f;
            --color-wordpress: #21759b;
            --color-feedonomics: #ff6b35;
            --color-makeswift: #6366f1;
            --color-vercel: #000000;
            --color-accent: #22d3ee;
            --color-warning: #f97316;
            --color-success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }

        .font-mono {
            font-family: 'IBM Plex Mono', monospace;
        }

        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .gradient-border {
            background: linear-gradient(135deg, var(--color-accent), var(--color-makeswift));
            padding: 1px;
            border-radius: 0.75rem;
        }

        .data-flow-line {
            stroke-dasharray: 8 4;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -12; }
        }

        .layer-card {
            backdrop-filter: blur(12px);
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .component-box {
            transition: all 0.2s ease;
        }

        .component-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px -5px rgba(0, 0, 0, 0.3);
        }

        @media print {
            body { background: white; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // View definitions
        const VIEWS = {
            DECISION: 'decision',
            ARCHITECTURE: 'architecture',
            DATA_FLOW: 'dataflow',
            STACK: 'stack'
        };

        // Component: Navigation Header
        function Header({ currentView, setView }) {
            const views = [
                { id: VIEWS.DECISION, label: 'Decision Framework', key: '1' },
                { id: VIEWS.ARCHITECTURE, label: 'Integration Architecture', key: '2' },
                { id: VIEWS.DATA_FLOW, label: 'Data Flow', key: '3' },
                { id: VIEWS.STACK, label: 'Tech Stack', key: '4' }
            ];

            return (
                <header className="bg-slate-900/80 backdrop-blur-lg border-b border-slate-700 sticky top-0 z-50 no-print">
                    <div className="max-w-7xl mx-auto px-6 py-4">
                        <div className="flex items-center justify-between">
                            <div>
                                <h1 className="text-xl font-bold text-white">
                                    Commerce.com + WordPress
                                </h1>
                                <p className="text-sm text-slate-400">Reference Architecture v1.0</p>
                            </div>

                            <nav className="flex gap-2">
                                {views.map(view => (
                                    <button
                                        key={view.id}
                                        onClick={() => setView(view.id)}
                                        className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                                            currentView === view.id
                                                ? 'bg-cyan-500 text-white'
                                                : 'bg-slate-800 text-slate-300 hover:bg-slate-700'
                                        }`}
                                    >
                                        <span className="font-mono text-xs mr-2 opacity-60">{view.key}</span>
                                        {view.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </div>
                </header>
            );
        }

        // Component: Decision Framework View
        function DecisionView() {
            const criteria = [
                {
                    id: 'data',
                    label: 'Data Complexity',
                    shopify: 'Clean catalog, <10K SKUs',
                    stack: 'Complex attributes, 50K+ SKUs',
                    weight: 25
                },
                {
                    id: 'b2b',
                    label: 'B2B Revenue',
                    shopify: '<10% of GMV',
                    stack: '>20% wholesale/B2B',
                    weight: 20
                },
                {
                    id: 'multichannel',
                    label: 'Multi-Channel',
                    shopify: '<20% marketplace',
                    stack: '>30% marketplace revenue',
                    weight: 20
                },
                {
                    id: 'wordpress',
                    label: 'WordPress Content',
                    shopify: 'Minimal, willing to migrate',
                    stack: '500+ SEO posts, retention needed',
                    weight: 15
                },
                {
                    id: 'technical',
                    label: 'Technical Team',
                    shopify: 'None / outsourced',
                    stack: 'In-house or agency',
                    weight: 10
                },
                {
                    id: 'growth',
                    label: 'Growth Trajectory',
                    shopify: 'Stable / modest',
                    stack: '3x+ in 3 years',
                    weight: 10
                }
            ];

            return (
                <div className="max-w-6xl mx-auto p-8">
                    <div className="text-center mb-12">
                        <h2 className="text-3xl font-bold mb-4">Platform Decision Framework</h2>
                        <p className="text-slate-400 text-lg">
                            "What Needs to Be True" for each migration path
                        </p>
                    </div>

                    {/* Decision Matrix */}
                    <div className="layer-card rounded-xl p-6 mb-8">
                        <div className="grid grid-cols-4 gap-4 mb-6">
                            <div className="font-semibold text-slate-300">Criterion</div>
                            <div className="font-semibold text-center" style={{color: 'var(--color-shopify)'}}>
                                → Shopify
                            </div>
                            <div className="font-semibold text-center" style={{color: 'var(--color-accent)'}}>
                                → Commerce.com Stack
                            </div>
                            <div className="font-semibold text-center text-slate-400">Weight</div>
                        </div>

                        {criteria.map((c, i) => (
                            <div key={c.id} className={`grid grid-cols-4 gap-4 py-4 ${i < criteria.length - 1 ? 'border-b border-slate-700' : ''}`}>
                                <div className="font-medium">{c.label}</div>
                                <div className="text-sm text-slate-300 bg-slate-800/50 rounded-lg p-3">
                                    {c.shopify}
                                </div>
                                <div className="text-sm text-slate-300 bg-slate-800/50 rounded-lg p-3">
                                    {c.stack}
                                </div>
                                <div className="text-center">
                                    <span className="inline-block bg-slate-700 rounded-full px-3 py-1 text-sm font-mono">
                                        {c.weight}%
                                    </span>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Distribution */}
                    <div className="grid grid-cols-3 gap-6">
                        <div className="layer-card rounded-xl p-6 text-center">
                            <div className="text-4xl font-bold mb-2" style={{color: 'var(--color-shopify)'}}>60%</div>
                            <div className="text-lg font-medium mb-2">Simplification Seekers</div>
                            <div className="text-sm text-slate-400">→ Shopify</div>
                        </div>
                        <div className="layer-card rounded-xl p-6 text-center">
                            <div className="text-4xl font-bold mb-2" style={{color: 'var(--color-accent)'}}>20%</div>
                            <div className="text-lg font-medium mb-2">Capability Seekers</div>
                            <div className="text-sm text-slate-400">→ Commerce.com Stack</div>
                        </div>
                        <div className="layer-card rounded-xl p-6 text-center">
                            <div className="text-4xl font-bold mb-2 text-slate-500">20%</div>
                            <div className="text-lg font-medium mb-2">Frozen Middle</div>
                            <div className="text-sm text-slate-400">→ Default to Shopify</div>
                        </div>
                    </div>

                    {/* Key Insight */}
                    <div className="mt-8 p-6 bg-gradient-to-r from-cyan-500/10 to-purple-500/10 border border-cyan-500/30 rounded-xl">
                        <div className="flex items-start gap-4">
                            <div className="text-3xl"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" strokeWidth="2"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2v1"/><path d="M12 22v-4"/><path d="M12 6a4 4 0 0 0-4 4c0 1.5.8 2.8 2 3.4V18h4v-4.6c1.2-.6 2-1.9 2-3.4a4 4 0 0 0-4-4z"/></svg></div>
                            <div>
                                <h3 className="font-semibold text-lg mb-2">Strategic Insight</h3>
                                <p className="text-slate-300">
                                    The Commerce.com Stack wins when <strong>WordPress content retention</strong> is a priority.
                                    This is the unique value proposition Shopify cannot match—and the basis for the WPEngine partnership.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Component: Architecture View
        function ArchitectureView() {
            return (

                            <div className="grid grid-cols-5 gap-4">

                                    <div key={channel} className="component-box bg-slate-800 rounded-lg p-4 text-center border border-slate-600">
                                        <div className="text-sm font-medium">{channel}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Arrow */}
                        <div className="flex justify-center my-4">
                            <svg width="40" height="30" viewBox="0 0 40 30">
                                <path d="M20 0 L20 20 M10 15 L20 25 L30 15" stroke="#22d3ee" strokeWidth="2" fill="none"/>

                                <div className="component-box rounded-lg p-5 border-2" style={{borderColor: 'var(--color-makeswift)', background: 'rgba(99, 102, 241, 0.1)'}}>

                                </div>
                                <div className="component-box rounded-lg p-5 border-2" style={{borderColor: 'var(--color-accent)', background: 'rgba(34, 211, 238, 0.1)'}}>
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className="w-3 h-3 rounded-full" style={{background: 'var(--color-accent)'}}></span>
                                        <span className="font-semibold">Catalyst</span>
                                    </div>
                                    <div className="text-sm text-slate-400">Next.js Storefront</div>
                                    <div className="text-xs text-slate-500 mt-2 font-mono">React Server Components</div>
                                </div>
                                <div className="component-box rounded-lg p-5 border-2 border-slate-600 bg-slate-800/50">
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className="w-3 h-3 rounded-full bg-white"></span>
                                        <span className="font-semibold">Vercel</span>
                                    </div>
                                    <div className="text-sm text-slate-400">Edge Hosting & CDN</div>
                                    <div className="text-xs text-slate-500 mt-2 font-mono">Global Edge Network</div>
                                </div>
                            </div>
                        </div>

                        {/* API Layer */}
                        <div className="mb-8 p-4 bg-gradient-to-r from-slate-800 to-slate-700 rounded-lg">
                            <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 text-center">
                                API Gateway Layer
                            </div>
                            <div className="flex justify-center gap-8 text-sm">
                                <span className="px-3 py-1 bg-slate-900 rounded font-mono">GraphQL Storefront API</span>
                                <span className="px-3 py-1 bg-slate-900 rounded font-mono">WPGraphQL</span>
                                <span className="px-3 py-1 bg-slate-900 rounded font-mono">REST APIs</span>
                            </div>
                        </div>

                        {/* Backend Services */}
                        <div className="grid grid-cols-2 gap-6 mb-8">
                            {/* Commerce Engine */}
                            <div className="rounded-xl overflow-hidden border-2" style={{borderColor: 'var(--color-bigcommerce)'}}>
                                <div className="p-3 font-semibold text-center" style={{background: 'var(--color-bigcommerce)'}}>
                                    Commerce Engine
                                </div>
                                <div className="p-5 bg-slate-800/80">
                                    <div className="grid grid-cols-2 gap-3">
                                        {[
                                            { name: 'BigCommerce', desc: 'Platform Core' },
                                            { name: 'Catalog', desc: 'Products & Variants' },
                                            { name: 'Cart & Checkout', desc: 'Transactions' },
                                            { name: 'Orders', desc: 'Order Management' },
                                            { name: 'Customers', desc: 'Accounts & Auth' },
                                            { name: 'B2B', desc: 'Price Lists, Quotes' }
                                        ].map(item => (
                                            <div key={item.name} className="bg-slate-700/50 rounded p-3">
                                                <div className="font-medium text-sm">{item.name}</div>
                                                <div className="text-xs text-slate-400">{item.desc}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Content Engine */}
                            <div className="rounded-xl overflow-hidden border-2" style={{borderColor: 'var(--color-wordpress)'}}>
                                <div className="p-3 font-semibold text-center" style={{background: 'var(--color-wordpress)'}}>
                                    Content Engine (WordPress)
                                </div>
                                <div className="p-5 bg-slate-800/80">
                                    <div className="grid grid-cols-2 gap-3">
                                        {[
                                            { name: 'WordPress CMS', desc: 'Content Management' },
                                            { name: 'Blog/Posts', desc: 'SEO Content' },
                                            { name: 'Media Library', desc: 'Images & Files' },
                                            { name: 'Custom Posts', desc: 'Landing Pages' },
                                            { name: 'WPGraphQL', desc: 'Headless API' },
                                            { name: 'ACF/Meta', desc: 'Custom Fields' }
                                        ].map(item => (
                                            <div key={item.name} className="bg-slate-700/50 rounded p-3">
                                                <div className="font-medium text-sm">{item.name}</div>
                                                <div className="text-xs text-slate-400">{item.desc}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Data Layer */}
                        <div className="rounded-xl overflow-hidden border-2" style={{borderColor: 'var(--color-feedonomics)'}}>
                            <div className="p-3 font-semibold text-center" style={{background: 'var(--color-feedonomics)'}}>
                                Data Orchestration Layer (Feedonomics)

                            <div className="p-5 bg-slate-800/80">
                                <div className="grid grid-cols-4 gap-4">
                                    {[
                                        { name: 'ETL Engine', desc: 'Data Transformation' },
                                        { name: 'Channel Sync', desc: 'Marketplace Publishing' },
                                        { name: 'Inventory', desc: 'Multi-Channel Stock' },
                                        { name: 'Analytics', desc: 'Performance Data' }
                                    ].map(item => (
                                        <div key={item.name} className="bg-slate-700/50 rounded p-4 text-center">
                                            <div className="font-medium">{item.name}</div>
                                            <div className="text-xs text-slate-400 mt-1">{item.desc}</div>
                                        </div>
                                    ))}
                                </div>

                                    <span key={int} className="px-4 py-2 bg-slate-800 rounded-lg text-sm border border-slate-700">
                                        {int}
                                    </span>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Legend */}
                    <div className="mt-6 flex justify-center gap-6 text-sm">
                        <div className="flex items-center gap-2">
                            <span className="w-4 h-4 rounded" style={{background: 'var(--color-bigcommerce)'}}></span>
                            <span>Commerce.com (BigCommerce)</span>
                        </div>
                        <div className="flex items-center gap-2">

                        </div>
                        <div className="flex items-center gap-2">
                            <span className="w-4 h-4 rounded" style={{background: 'var(--color-feedonomics)'}}></span>
                            <span>Feedonomics</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="w-4 h-4 rounded" style={{background: 'var(--color-makeswift)'}}></span>
                            <span>Makeswift</span>

        // Component: Data Flow View
        function DataFlowView() {

                    {/* Migration Flow Diagram */}

                                <div className="text-xs text-slate-500 space-y-1">
                                    <div>Products</div>
                                    <div>Orders</div>
                                    <div>Customers</div>
                                    <div>Content</div>
                                </div>
                            </div>

                            {/* Arrow */}
                            <div className="flex items-center justify-center pt-16">
                                <svg width="60" height="30" viewBox="0 0 60 30">
                                    <path d="M0 15 L50 15 M40 5 L55 15 L40 25" stroke="#f97316" strokeWidth="2" fill="none" className="data-flow-line"/>
                                </svg>

                                <div className="rounded-xl p-4 mb-4 border-2" style={{borderColor: 'var(--color-feedonomics)', background: 'rgba(255, 107, 53, 0.1)'}}>

                                    <div className="font-medium">Commerce.com</div>
                                    <div className="text-xs text-slate-400 mt-2">BigCommerce + WP</div>

                            <div className="bg-slate-800 rounded-lg p-4">

                        </div>
                    </div>
                </div>
            );
        }

        // Component: Tech Stack View
        function StackView() {

                    layer: 'Frontend',

                        { name: 'Makeswift', role: 'Visual Builder', vendor: 'Commerce.com' },
                        { name: 'Tailwind CSS', role: 'Styling', vendor: 'Open Source' }
                    ]

                    layer: 'Hosting',

                        { name: 'Vercel', role: 'Edge Hosting', vendor: 'Vercel' },
                        { name: 'WPEngine', role: 'WordPress Hosting', vendor: 'WPEngine' },
                        { name: 'Cloudflare', role: 'CDN/WAF', vendor: 'Cloudflare' }
                    ]
                },
                {

                    components: [
                        { name: 'BigCommerce', role: 'Commerce Platform', vendor: 'Commerce.com' },

                    ]
                }
            ];

            return (
                <div className="max-w-6xl mx-auto p-8">
                    <div className="text-center mb-8">
                        <h2 className="text-3xl font-bold mb-4">Technology Stack</h2>
                        <p className="text-slate-400">Component breakdown by layer</p>
                    </div>

                    <div className="space-y-6">
                        {stack.map(layer => (
                            <div key={layer.layer} className="layer-card rounded-xl overflow-hidden">
                                <div className="bg-slate-700 px-6 py-3">
                                    <span className="font-semibold">{layer.layer} Layer</span>
                                </div>
                                <div className="p-6">
                                    <div className="grid grid-cols-3 gap-4">
                                        {layer.components.map(comp => (

                                                <div className="text-sm text-slate-400 mb-2">{comp.role}</div>

                                    <div className="flex justify-between">

                                        <span className="font-mono">$24,000</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span>Vercel Pro</span>
                                        <span className="font-mono">$6,000</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span>Makeswift</span>
                                        <span className="font-mono">$6,000</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span>WPEngine (retained)</span>

                                    </div>
                                    <div className="flex justify-between border-t border-slate-600 pt-2 mt-2 font-semibold">
                                        <span>Total Platform</span>
                                        <span className="font-mono text-cyan-400">$72,000/yr</span>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <div className="text-sm text-slate-400 mb-3">Implementation Costs (One-Time)</div>
                                <div className="space-y-2">
                                    <div className="flex justify-between">

                                    </div>

                                    </div>
                                    <div className="flex justify-between">
                                        <span>Data Migration</span>

                                    </div>
                                    <div className="flex justify-between">
                                        <span>Integration & Testing</span>
                                        <span className="font-mono">$35,000</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span>Launch & Stabilization</span>
                                        <span className="font-mono">$25,000</span>
                                    </div>
                                    <div className="flex justify-between border-t border-slate-600 pt-2 mt-2 font-semibold">

                </div>
            );
        }

        // Main App
        function App() {
            const [currentView, setView] = useState(VIEWS.DECISION);

            // Keyboard navigation
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === '1') setView(VIEWS.DECISION);
                    if (e.key === '2') setView(VIEWS.ARCHITECTURE);
                    if (e.key === '3') setView(VIEWS.DATA_FLOW);
                    if (e.key === '4') setView(VIEWS.STACK);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            return (
                <div className="min-h-screen">
                    <Header currentView={currentView} setView={setView} />

                    <main className="pb-16">
                        {currentView === VIEWS.DECISION && <DecisionView />}
                        {currentView === VIEWS.ARCHITECTURE && <ArchitectureView />}
                        {currentView === VIEWS.DATA_FLOW && <DataFlowView />}
                        {currentView === VIEWS.STACK && <StackView />}
                    </main>

                    {/* Footer */}
                    <footer className="fixed bottom-0 left-0 right-0 bg-slate-900/90 backdrop-blur border-t border-slate-700 py-3 no-print">
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center text-sm text-slate-400">
                            <div>
                                Commerce.com + WordPress Reference Architecture • v1.0 • December 2025
                            </div>
                            <div className="flex gap-4">
                                <span className="font-mono">1-4: Switch views</span>
                                <span className="font-mono">P: Print</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
