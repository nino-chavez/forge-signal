<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Commerce Ecosystem Architecture</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bby-blue': '#0046BE',
            'bby-dark': '#001E73',
            'bby-yellow': '#FFF200',
          }
        }
      }
    }
  </script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    @keyframes flowDown {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes flowUp {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .animate-flow-down { animation: flowDown 2s ease-in-out infinite; }
    .animate-flow-up { animation: flowUp 2s ease-in-out infinite 0.5s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // SVG Icons
    const Icons = {
      Globe: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>
        </svg>
      ),
      Building: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/>
        </svg>
      ),
      MessageSquare: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      ),
      Smartphone: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/>
        </svg>
      ),
      Monitor: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/>
        </svg>
      ),
      Shield: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/>
        </svg>
      ),
      Brain: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 2.96 3.08 2.5 2.5 0 0 0 4.91.05L12 20V4.5Z"/><path d="M16 8V5c0-1.1.9-2 2-2"/><path d="M12 13h4"/><path d="M12 18h6a2 2 0 0 1 2 2v1"/><path d="M12 8h8"/><path d="M20.5 8a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/><path d="M16.5 13a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/><path d="M20.5 21a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/><path d="M18.5 3a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/>
        </svg>
      ),
      Search: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
      ),
      User: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      ),
      Puzzle: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M19.439 7.85c-.049.322.059.648.289.878l1.568 1.568c.47.47.706 1.087.706 1.704s-.235 1.233-.706 1.704l-1.611 1.611a.98.98 0 0 1-.837.276c-.47-.07-.802-.48-.968-.925a2.501 2.501 0 1 0-3.214 3.214c.446.166.855.497.925.968a.979.979 0 0 1-.276.837l-1.61 1.61a2.404 2.404 0 0 1-1.705.707 2.402 2.402 0 0 1-1.704-.706l-1.568-1.568a1.026 1.026 0 0 0-.877-.29c-.493.074-.84.504-1.02.968a2.5 2.5 0 1 1-3.237-3.237c.464-.18.894-.527.967-1.02a1.026 1.026 0 0 0-.289-.877l-1.568-1.568A2.402 2.402 0 0 1 1.998 12c0-.617.236-1.234.706-1.704L4.23 8.77c.24-.24.581-.353.917-.303.515.077.877.528 1.073 1.01a2.5 2.5 0 1 0 3.259-3.259c-.482-.196-.933-.558-1.01-1.073-.05-.336.062-.676.303-.917l1.525-1.525A2.402 2.402 0 0 1 12 1.998c.617 0 1.234.236 1.704.706l1.568 1.568c.23.23.556.338.877.29.493-.074.84-.504 1.02-.968a2.5 2.5 0 1 1 3.237 3.237c-.464.18-.894.527-.967 1.02Z"/>
        </svg>
      ),
      DollarSign: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      ),
      Database: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/>
        </svg>
      ),
      Truck: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/>
        </svg>
      ),
      Headphones: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/>
        </svg>
      ),
      CreditCard: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/>
        </svg>
      ),
      ArrowDown: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M12 5v14"/><path d="m19 12-7 7-7-7"/>
        </svg>
      ),
      ArrowUp: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="m5 12 7-7 7 7"/><path d="M12 19V5"/>
        </svg>
      ),
      Zap: ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      ),
    };

    // Agent Logo Component - Compact
    const AgentLogo = ({ name, color }) => (
      <div className="flex items-center gap-2 bg-white/90 px-2 py-1.5 rounded-md shadow-sm border border-slate-200">
        <div className={`w-2 h-2 rounded-full ${color}`}></div>
        <span className="text-xs font-semibold text-slate-700">{name}</span>
      </div>
    );

    // Channel Card Component - Compact
    const ChannelCard = ({ icon: Icon, label }) => (
      <div className="flex flex-col items-center bg-white/90 px-3 py-2 rounded-md shadow-sm border border-slate-200">
        <Icon size={18} className="text-bby-blue mb-0.5" />
        <span className="text-[10px] font-semibold text-slate-700 text-center">{label}</span>
      </div>
    );

    // Orchestration Block Component - Compact
    const OrchBlock = ({ icon: Icon, title, subtitle }) => (
      <div className="bg-white/15 backdrop-blur-sm border border-white/30 p-3 rounded-lg text-center hover:bg-white/25 transition-all duration-300 group">
        <div className="w-8 h-8 bg-bby-yellow/20 rounded-lg flex items-center justify-center mx-auto mb-2 group-hover:bg-bby-yellow/30 transition-colors">
          <Icon size={18} className="text-bby-yellow" />
        </div>
        <div className="font-bold text-bby-yellow text-sm mb-0.5">{title}</div>
        <div className="text-[11px] text-blue-100 opacity-90 leading-tight">{subtitle}</div>
      </div>
    );

    // Foundation Pillar Component - With "Why Needed" explanation
    const FoundationPillar = ({ icon: Icon, title, items, whyNeeded, accent }) => (
      <div className={`bg-white rounded-lg shadow-md border-t-4 ${accent} p-3 hover:shadow-lg transition-shadow`}>
        <div className="flex items-center gap-2 mb-2">
          <div className="w-7 h-7 bg-slate-100 rounded flex items-center justify-center">
            <Icon size={16} className="text-slate-600" />
          </div>
          <h4 className="font-bold text-slate-800 text-sm">{title}</h4>
        </div>
        <ul className="text-xs text-slate-600 space-y-0.5 mb-2">
          {items.map((item, i) => (
            <li key={i} className="flex items-center gap-1.5">
              <div className="w-1 h-1 rounded-full bg-slate-400"></div>
              {item}
            </li>
          ))}
        </ul>
        <div className="text-[10px] text-slate-500 italic border-t border-slate-100 pt-1.5 leading-tight">
          {whyNeeded}
        </div>
      </div>
    );

    const SlideDeck = () => {
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-100 to-slate-200 p-4 flex items-start justify-center">
          {/* Slide Container */}
          <div className="w-full max-w-6xl bg-white shadow-2xl rounded-xl overflow-hidden">

            {/* Header - Compact */}
            <div className="bg-gradient-to-r from-bby-dark to-bby-blue text-white px-6 py-4 flex justify-between items-end">
              <div>
                <h1 className="text-2xl font-bold tracking-tight">AGENTIC COMMERCE ECOSYSTEM ARCHITECTURE</h1>
                <p className="text-bby-yellow font-medium mt-1 text-sm">Unified Operating Model for On-Platform & Off-Platform Intelligence</p>
              </div>
              <div className="text-right text-xs opacity-80">
                <p className="font-semibold">Dec 9 Executive Meeting</p>
                <p>Confidential</p>
              </div>
            </div>

            {/* Main Content */}
            <div className="p-5 bg-slate-50 relative">

              {/* ========== LAYER 1: THE FRONT DOOR ========== */}
              <div className="relative z-10 mb-2">
                <div className="flex gap-4">

                  {/* Left: Off-Platform Agents */}
                  <div className="flex-1 bg-gradient-to-br from-slate-50 to-white border-2 border-slate-200 rounded-lg p-3 shadow-sm">
                    <div className="flex items-center justify-between mb-2">
                      <div className="flex items-center gap-2">
                        <div className="w-6 h-6 bg-bby-blue/10 rounded flex items-center justify-center">
                          <Icons.Globe size={14} className="text-bby-blue" />
                        </div>
                        <h3 className="font-bold text-slate-800 text-sm">Off-Platform Agents</h3>
                      </div>
                      <span className="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-semibold uppercase">Traffic Drivers</span>
                    </div>
                    <p className="text-[10px] text-slate-500 mb-2 italic">"Ambassadors" — Drive traffic. We control data via API.</p>
                    <div className="grid grid-cols-2 gap-2">
                      <AgentLogo name="OpenAI / ChatGPT" color="bg-emerald-500" />
                      <AgentLogo name="Google Gemini" color="bg-blue-500" />
                      <AgentLogo name="Microsoft Copilot" color="bg-indigo-500" />
                      <AgentLogo name="Perplexity" color="bg-teal-500" />
                    </div>
                  </div>

                  {/* Right: Owned Channels */}
                  <div className="flex-1 bg-gradient-to-br from-slate-50 to-white border-2 border-slate-200 rounded-lg p-3 shadow-sm">
                    <div className="flex items-center justify-between mb-2">
                      <div className="flex items-center gap-2">
                        <div className="w-6 h-6 bg-bby-blue/10 rounded flex items-center justify-center">
                          <Icons.Building size={14} className="text-bby-blue" />
                        </div>
                        <h3 className="font-bold text-slate-800 text-sm">Owned Channels</h3>
                      </div>
                      <span className="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-semibold uppercase">Retention Drivers</span>
                    </div>
                    <p className="text-[10px] text-slate-500 mb-2 italic">"Concierges" — Full control. Deeper data for logged-in users.</p>
                    <div className="flex gap-2 justify-center">
                      <ChannelCard icon={Icons.MessageSquare} label="BestBuy.com Chat" />
                      <ChannelCard icon={Icons.Smartphone} label="Mobile App" />
                      <ChannelCard icon={Icons.Monitor} label="In-Store Kiosk" />
                    </div>
                  </div>
                </div>

                {/* Down Arrows */}
                <div className="flex justify-around my-1.5">
                  <div className="flex flex-col items-center animate-flow-down">
                    <Icons.ArrowDown size={20} className="text-slate-400" />
                  </div>
                  <div className="flex flex-col items-center animate-flow-down" style={{ animationDelay: '0.3s' }}>
                    <Icons.ArrowDown size={20} className="text-slate-400" />
                  </div>
                </div>

                {/* API Gateway Bar */}
                <div className="w-full bg-gradient-to-r from-slate-800 via-slate-700 to-slate-800 text-white py-2 rounded flex items-center justify-center shadow-lg border-t-4 border-bby-yellow relative overflow-hidden">
                  <Icons.Shield size={16} className="mr-2 text-bby-yellow relative z-10" />
                  <span className="text-xs font-bold tracking-widest uppercase relative z-10">API Gateway & Security Layer</span>
                  <span className="ml-3 text-[10px] text-slate-400 relative z-10">"The Bouncer" — Verifies requests, blocks bad actors</span>
                </div>
              </div>

              {/* Down Arrows to Orchestration */}
              <div className="flex justify-around my-1">
                <Icons.ArrowDown size={18} className="text-bby-blue animate-flow-down" />
                <Icons.ArrowDown size={18} className="text-bby-blue animate-flow-down" style={{ animationDelay: '0.2s' }} />
                <Icons.ArrowDown size={18} className="text-bby-blue animate-flow-down" style={{ animationDelay: '0.4s' }} />
              </div>

              {/* ========== LAYER 2: THE DECISION ENGINE ========== */}
              <div className="relative z-20 my-2">
                <div className="bg-gradient-to-br from-bby-dark via-bby-blue to-bby-dark rounded-xl shadow-2xl p-4 text-white border border-blue-700 relative overflow-hidden">
                  {/* Header */}
                  <div className="flex items-center justify-center mb-4 relative z-10">
                    <div className="w-10 h-10 bg-bby-yellow/20 rounded-lg flex items-center justify-center mr-3">
                      <Icons.Brain size={24} className="text-bby-yellow" />
                    </div>
                    <div>
                      <h2 className="text-xl font-bold tracking-wide">ORCHESTRATION LAYER</h2>
                      <p className="text-bby-yellow text-xs font-medium">"The Headless Agent" — The Brain connecting needs to inventory</p>
                    </div>
                  </div>

                  {/* 4 Blocks */}
                  <div className="grid grid-cols-4 gap-3 relative z-10">
                    <OrchBlock
                      icon={Icons.Search}
                      title="Intent Analysis"
                      subtitle='"The Translator" — Decodes user needs into technical specs'
                    />
                    <OrchBlock
                      icon={Icons.User}
                      title="Context Engine"
                      subtitle='"The Memory" — Customer 360 & purchase history'
                    />
                    <OrchBlock
                      icon={Icons.Puzzle}
                      title="Matchmaking Logic"
                      subtitle='"The Expert Clerk" — Product compatibility rules'
                    />
                    <OrchBlock
                      icon={Icons.DollarSign}
                      title="Pricing & Offers"
                      subtitle='"The Negotiator" — Real-time margin & bundling'
                    />
                  </div>
                </div>
              </div>

              {/* Up Arrows with Label */}
              <div className="flex items-center justify-center gap-6 my-2">
                <div className="flex items-center gap-1">
                  <Icons.ArrowUp size={18} className="text-bby-blue animate-flow-up" />
                  <Icons.ArrowUp size={18} className="text-bby-blue animate-flow-up" style={{ animationDelay: '0.15s' }} />
                </div>
                <div className="bg-bby-blue text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider shadow-md flex items-center gap-1.5">
                  <Icons.Zap size={12} />
                  Real-Time Data Telemetry
                </div>
                <div className="flex items-center gap-1">
                  <Icons.ArrowUp size={18} className="text-bby-blue animate-flow-up" style={{ animationDelay: '0.3s' }} />
                  <Icons.ArrowUp size={18} className="text-bby-blue animate-flow-up" style={{ animationDelay: '0.45s' }} />
                </div>
              </div>

              {/* ========== LAYER 3: THE FOUNDATION ========== */}
              <div className="relative z-10">
                <div className="bg-gradient-to-b from-slate-100 to-slate-200 rounded-lg border border-slate-300 p-4 shadow-inner">
                  <h3 className="text-center font-bold text-slate-700 mb-3 uppercase tracking-widest text-xs flex items-center justify-center gap-2">
                    <Icons.Database size={14} />
                    Commerce Foundation — Systems of Record
                  </h3>

                  <div className="grid grid-cols-4 gap-3">
                    <FoundationPillar
                      icon={Icons.Database}
                      title="Product Truth"
                      items={["PIM (Specs & Attributes)", "Vector Search Index"]}
                      whyNeeded="AI needs facts: 'Does this laptop have 16GB RAM?' PIM provides structured answers so AI doesn't guess."
                      accent="border-blue-500"
                    />
                    <FoundationPillar
                      icon={Icons.Truck}
                      title="Supply Chain"
                      items={["Inventory (ATP)", "Logistics & Fulfillment"]}
                      whyNeeded="If AI sells a TV, it must exist. Confirms: 'In stock at Chicago, deliverable Tuesday.'"
                      accent="border-green-500"
                    />
                    <FoundationPillar
                      icon={Icons.Headphones}
                      title="Service & Support"
                      items={["Warranty Logic", "Knowledge Base"]}
                      whyNeeded="User asks 'How do I reset this?' AI pulls step-by-step from KB, converting PDF to chat."
                      accent="border-orange-500"
                    />
                    <FoundationPillar
                      icon={Icons.CreditCard}
                      title="Transaction"
                      items={["Payments Processing", "Fraud Detection"]}
                      whyNeeded="When agent says 'Buy now,' processes payment & checks if behavior looks like scalper/bot."
                      accent="border-purple-500"
                    />
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SlideDeck />);
  </script>
</body>
</html>
