<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Commerce Ecosystem Architecture v5.1 - Best Buy</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bby-blue': '#0046BE',
            'bby-dark': '#001E73',
            'bby-yellow': '#FFF200',
          }
        }
      }
    }
  </script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

    /* Flow Animations */
    @keyframes flowDown {
      0%, 100% { opacity: 0.4; transform: translateY(-2px); }
      50% { opacity: 1; transform: translateY(2px); }
    }
    @keyframes flowUp {
      0%, 100% { opacity: 0.4; transform: translateY(2px); }
      50% { opacity: 1; transform: translateY(-2px); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 5px rgba(0, 70, 190, 0.3); }
      50% { box-shadow: 0 0 20px rgba(0, 70, 190, 0.6); }
    }
    .animate-flow-down { animation: flowDown 2s ease-in-out infinite; }
    .animate-flow-up { animation: flowUp 2s ease-in-out infinite; }
    .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .flow-line {
      stroke-dasharray: 8 4;
      animation: dash 1s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -12; }
    }

    /* View Toggle System */
    .view-toggle-container {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .view-content {
      animation: fadeSlideIn 0.35s ease-out;
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Toggle Button Styles */
    .view-toggle-btn {
      position: relative;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 6px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .view-toggle-btn:hover {
      transform: translateY(-1px);
    }

    .view-toggle-btn.active {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    /* Impact Card Styles */
    .impact-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.2s ease;
    }

    .impact-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Section Badge */
    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Print Styles */
    @media print {
      @page { size: A3 landscape; margin: 0.5in; }
      body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .animate-flow-down, .animate-flow-up, .flow-line, .animate-pulse-glow { animation: none !important; }
      .no-print { display: none !important; }

      /* Print-specific glossary styles */
      .print-glossary { display: block !important; page-break-before: always; }
      .glossary-print-section { break-inside: avoid; margin-bottom: 1rem; }
      .glossary-print-term { break-inside: avoid; padding: 0.5rem; border: 1px solid #e2e8f0; margin-bottom: 0.5rem; }
    }

    @media screen {
      .print-glossary { display: none !important; }
    }

    /* ==================== PRESENTATION MODE STYLES ==================== */

    /* Sidebar Navigation */
    .nav-sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 280px;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
    }

    .nav-sidebar.open {
      transform: translateX(0);
    }

    .nav-sidebar-toggle {
      position: fixed;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 99;
      width: 44px;
      height: 44px;
      background: #0046BE;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0, 70, 190, 0.4);
      transition: all 0.2s ease;
    }

    .nav-sidebar-toggle:hover {
      transform: translateY(-50%) scale(1.1);
      box-shadow: 0 6px 20px rgba(0, 70, 190, 0.5);
    }

    .nav-sidebar-toggle.sidebar-open {
      left: 296px;
    }

    /* Collapsible Sections */
    .section-collapsible {
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .section-collapsible.collapsed {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-top: 0;
    }

    .section-collapsible.expanded {
      max-height: 5000px;
      opacity: 1;
    }

    .section-header-clickable {
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .section-header-clickable:hover {
      transform: translateX(4px);
    }

    .expand-icon {
      transition: transform 0.3s ease;
    }

    .expand-icon.expanded {
      transform: rotate(90deg);
    }

    /* Nav Item Styles */
    .nav-item {
      padding: 10px 16px;
      margin: 4px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-item.active {
      background: rgba(0, 70, 190, 0.3);
      border-left-color: #FFF200;
    }

    .nav-item.hidden-by-track {
      opacity: 0.3;
      pointer-events: none;
    }

    /* Track Selector */
    .track-selector {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
    }

    .track-btn {
      flex: 1;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      background: transparent;
    }

    .track-btn:hover {
      color: white;
      background: rgba(255, 255, 255, 0.1);
    }

    .track-btn.active {
      color: #001E73;
      background: #FFF200;
      font-weight: 700;
    }

    /* Keyboard hint */
    .keyboard-hint {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      font-size: 10px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Main content offset when sidebar open */
    .main-content {
      transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .main-content.sidebar-open {
      margin-left: 280px;
    }

    /* Section hidden by track */
    .section-hidden {
      display: none !important;
    }

    /* Progress indicator */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: #FFF200;
      z-index: 1000;
      transition: width 0.1s ease;
    }
  </style>
</head>

    // ==================== GLOSSARY TERM COMPONENT (Inline Tooltip) ====================
    const GlossaryTerm = ({ termKey, category, children }) => {
      const [showTooltip, setShowTooltip] = React.useState(false);
      const termData = glossaryData[category]?.terms[termKey];

      if (!termData) return <span>{children}</span>;

      return (
        <span className="relative inline-block">
          <span
            className="border-b border-dotted border-current cursor-help"
            onMouseEnter={() => setShowTooltip(true)}
            onMouseLeave={() => setShowTooltip(false)}
            onClick={() => setShowTooltip(!showTooltip)}
          >
            {children || termData.term}
          </span>
          {showTooltip && (
            <div className="absolute z-50 bottom-full left-1/2 -translate-x-1/2 mb-2 w-72 p-3 bg-slate-900 text-white rounded-lg shadow-xl text-xs no-print">
              <div className="font-bold text-bby-yellow mb-1">

    // ==================== GLOBAL GLOSSARY SIDEBAR ====================
    const GlobalGlossarySidebar = ({ isOpen, onClose }) => {
      const [searchTerm, setSearchTerm] = React.useState('');
      const [expandedCategory, setExpandedCategory] = React.useState(null);

      // Flatten all terms for search
      const allTerms = React.useMemo(() => {
        const terms = [];
        Object.entries(glossaryData).forEach(([category, data]) => {
          Object.entries(data.terms).forEach(([key, term]) => {
            terms.push({ ...term, category, categoryTitle: data.title });
          });
        });
        return terms;
      }, []);

      // Filter terms by search
      const filteredTerms = searchTerm
        ? allTerms.filter(t =>
            t.term.toLowerCase().includes(searchTerm.toLowerCase()) ||
            (t.full && t.full.toLowerCase().includes(searchTerm.toLowerCase())) ||
            t.definition.toLowerCase().includes(searchTerm.toLowerCase())
          )
        : null;

      return (
        <>
          {/* Overlay */}
          {isOpen && (
            <div
              className="fixed inset-0 bg-black/50 z-40 no-print"
              onClick={onClose}
            />
          )}

          {/* Sidebar */}
          <div className={`fixed top-0 right-0 h-full w-full sm:w-80 md:w-96 bg-slate-900 shadow-2xl z-50 transform transition-transform duration-300 no-print ${isOpen ? 'translate-x-0' : 'translate-x-full'}`}>

            </div>

            {/* Search */}

              <div className="relative">
                <Icons.Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                <input
                  type="text"
                  placeholder="Search terms..."
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  className="w-full pl-9 pr-4 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-400 focus:outline-none focus:border-bby-yellow"
                />
              </div>
            </div>

            {/* Content */}
            <div className="overflow-y-auto h-[calc(100%-140px)] p-4">
              {filteredTerms ? (
                /* Search Results */
                <div className="space-y-3">
                  <div className="text-xs text-slate-400 mb-2">{filteredTerms.length} results</div>
                  {filteredTerms.map((term, i) => (
                    <div key={i} className="bg-slate-800 rounded-lg p-3">
                      <div className="flex items-start justify-between mb-1">
                        <div className="font-bold text-bby-yellow">
                          {term.term}
                          {term.full && <span className="font-normal text-slate-400 text-xs ml-1">({term.full})</span>}
                        </div>
                        <span className="text-[10px] bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded">
                          {term.categoryTitle}
                        </span>
                      </div>
                      <p className="text-xs text-slate-300">{term.definition}</p>
                      {term.example && (
                        <p className="text-[11px] text-slate-500 mt-2 italic">→ {term.example}</p>
                      )}
                    </div>
                  ))}
                </div>
              ) : (
                /* Category Accordions */
                <div className="space-y-2">
                  {Object.entries(glossaryData).map(([category, data]) => (
                    <div key={category} className="border border-slate-700 rounded-lg overflow-hidden">
                      <button

                      </button>
                      {expandedCategory === category && (
                        <div className="p-3 space-y-3 bg-slate-800/50">
                          {Object.values(data.terms).map((term, i) => (
                            <div key={i} className="bg-slate-900/50 rounded p-2.5">
                              <div className="font-semibold text-bby-yellow text-sm mb-1">
                                {term.term}
                                {term.full && <span className="font-normal text-slate-500 text-xs ml-1">({term.full})</span>}

          const docHeight = document.documentElement.scrollHeight - window.innerHeight;
          setScrollProgress((scrollTop / docHeight) * 100);

          // Find current section
          const sectionElements = SECTIONS.map(s => ({
            id: s.id,
            el: document.getElementById(`section-${s.id}`)

          for (let i = sectionElements.length - 1; i >= 0; i--) {
            const { id, el } = sectionElements[i];
            const rect = el.getBoundingClientRect();
            if (rect.top <= 150) {
              setCurrentSection(id);
              break;
            }
          }
        };

        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // Keyboard shortcuts
      React.useEffect(() => {
        const handleKeyDown = (e) => {
          // Ignore if typing in input
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

          const key = e.key.toLowerCase();

          // Number keys 1-9 for section jump
          if (key >= '1' && key <= '9') {
            const idx = parseInt(key) - 1;
            const visibleSections = SECTIONS.filter(s => s.tracks.includes(currentTrack));
            if (idx < visibleSections.length) {
              const section = visibleSections[idx];
              scrollToSection(section.id);
              if (!expandedSections.includes(section.id)) {
                setExpandedSections(prev => [...prev, section.id]);
              }
            }
          }

          // N - toggle nav
          if (key === 'n') {
            setNavOpen(prev => !prev);
          }

          // E - expand all
          if (key === 'e') {
            setExpandedSections(SECTIONS.map(s => s.id));
          }

          // C - collapse all
          if (key === 'c') {
            setExpandedSections([]);
          }

          // T - cycle track
          if (key === 't') {
            const trackKeys = Object.keys(TRACKS);

            const nextIdx = (currentIdx + 1) % trackKeys.length;
            setCurrentTrack(trackKeys[nextIdx]);

            const visibleSections = SECTIONS.filter(s => s.tracks.includes(currentTrack));
            const currentIdx = visibleSections.findIndex(s => s.id === currentSection);
            let newIdx;
            if (key === 'arrowleft') {

              newIdx = Math.min(visibleSections.length - 1, currentIdx + 1);
            }
            const section = visibleSections[newIdx];
            scrollToSection(section.id);
            if (!expandedSections.includes(section.id)) {
              setExpandedSections(prev => [...prev, section.id]);
            }
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
