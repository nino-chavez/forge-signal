<head>

      theme: {
        extend: {

  <style>
    /* Light Theme */
    :root {
      --bg-page: #f1f5f9;
      --bg-card: #ffffff;
      --bg-card-alt: #f8fafc;
      --bg-header: linear-gradient(135deg, #001E73 0%, #0046BE 100%);
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --text-on-dark: #ffffff;
      --text-on-dark-secondary: #93c5fd;
      --border-color: #e2e8f0;
      --border-color-strong: #cbd5e1;
      --accent-blue: #0046BE;
      --accent-yellow: #FFF200;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
    }

    .keyboard-hint {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 4px;
      font-size: 10px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      margin-left: 4px;
    }

    /* Flow Animations */
    @keyframes flowDown {
      0%, 100% { opacity: 0.4; transform: translateY(-2px); }
      50% { opacity: 1; transform: translateY(2px); }
    }
    @keyframes flowUp {
      0%, 100% { opacity: 0.4; transform: translateY(2px); }
      50% { opacity: 1; transform: translateY(-2px); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 5px rgba(0, 70, 190, 0.3); }
      50% { box-shadow: 0 0 20px rgba(0, 70, 190, 0.6); }
    }
    .animate-flow-down { animation: flowDown 2s ease-in-out infinite; }
    .animate-flow-up { animation: flowUp 2s ease-in-out infinite; }
    .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .flow-line {
      stroke-dasharray: 8 4;
      animation: dash 1s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -12; }
    }

    /* View Toggle System */
    .view-toggle-container {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .view-content {
      animation: fadeSlideIn 0.35s ease-out;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Toggle Button Styles */
    .view-toggle-btn {
      position: relative;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 6px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .view-toggle-btn:hover { transform: translateY(-1px); }
    .view-toggle-btn.active { box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15); }

    /* Impact Card Styles */
    .impact-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.2s ease;
    }

    .impact-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Section Badge */
    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Example Tag */
    .example-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.7);
      margin-right: 4px;
      margin-bottom: 4px;
    }

    .example-tag.light {
      background: rgba(0, 70, 190, 0.1);
      color: rgba(0, 70, 190, 0.8);
    }

    /* Pattern Card */
    .pattern-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 12px;
      transition: all 0.2s ease;
    }

    .pattern-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .pattern-card.light {
      background: rgba(0, 70, 190, 0.03);
      border-color: rgba(0, 70, 190, 0.1);
    }

    .pattern-card.light:hover {
      background: rgba(0, 70, 190, 0.06);
      border-color: rgba(0, 70, 190, 0.2);
    }

    /* Print Styles */
    @media print {
      @page { size: A3 landscape; margin: 0.5in; }
      body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .animate-flow-down, .animate-flow-up, .flow-line, .animate-pulse-glow { animation: none !important; }
      .no-print { display: none !important; }
      .print-glossary { display: block !important; page-break-before: always; }
    }

    @media screen {
      .print-glossary { display: none !important; }
    }
  </style>
</head>

            { term: "CDP", full: "Customer Data Platform", definition: "A system that collects all customer data into one unified profile—purchases, browsing, preferences, membership status.", example: "CDP knows you're a Total Tech member who prefers Apple products and usually buys in the $800-1500 range." },
            { term: "PIM", full: "Product Information Management", definition: "The master system storing all product data—names, descriptions, specs, images, categories. The 'source of truth' for product info.", example: "When AI describes a MacBook's specs, that data comes from PIM." },
            { term: "ATP", full: "Available to Promise", definition: "Real-time inventory that's actually available to sell—accounting for what's reserved, in transit, or already sold.", example: "The website shows '5 in stock' because ATP calculated: 10 in warehouse - 3 reserved - 2 pending = 5 available." },
            { term: "Syndication", definition: "Distribution of product content (descriptions, images, specs) to multiple channels via services like Syndigo or Salsify.", example: "Best Buy syndicates TV specs to Amazon, Google Shopping, and affiliate sites—ensuring consistency everywhere." },
            { term: "Editorial Content", definition: "Human-authored guides, comparisons, and recommendations that establish expertise. Critical for GEO—AI agents cite authoritative content.", example: "'Best 4K TVs for Gaming 2025' written by Best Buy experts—gets cited by ChatGPT as a trusted source." },
          ]
        },
        geo: {
          title: "GEO & Content Terms",
          terms: [
            { term: "GEO", full: "Generative Engine Optimization", definition: "Optimizing content so AI agents cite and recommend a brand. Like SEO, but for ChatGPT, Gemini, and Perplexity instead of Google.", example: "When someone asks ChatGPT 'best 4K TV?', GEO helps ensure Best Buy's buying guide gets cited as a source." },
            { term: "Citation Share", definition: "The percentage of AI-generated answers that cite a brand as a source. A key GEO metric replacing traditional search rankings.", example: "If 100 people ask ChatGPT about laptops and 30 responses cite Best Buy, that's 30% citation share." },
            { term: "Schema Markup", definition: "Structured data tags that help AI understand page content—products, reviews, FAQs, how-tos. Makes content machine-readable.", example: "Schema tells AI: 'This page has Product X, priced at $999, rated 4.5 stars, with 2,847 reviews.'" },
            { term: "E-E-A-T", full: "Experience, Expertise, Authoritativeness, Trustworthiness", definition: "Quality criteria that AI agents use to evaluate content. Content from credible experts ranks higher.", example: "A TV buying guide written by Geek Squad experts with cited specs has higher E-E-A-T than generic AI-written content." },
          ]
        }
      };

      return (
        <div className="space-y-6 view-content">
          <section className="bg-bby-dark rounded-xl p-6 text-white">
            <h2 className="text-2xl font-bold mb-2">Glossary of Terms</h2>
            <p className="text-blue-200">
              Plain-English definitions of technical terminology. Hover over dotted-underlined terms in the architecture view for inline definitions.
            </p>
          </section>

          {Object.entries(glossaryData).map(([key, category]) => (
            <section key={key} className="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
              <h3 className="text-lg font-bold text-bby-blue mb-4">{category.title}</h3>
              <div className="grid grid-cols-2 gap-4">
                {category.terms.map((term, idx) => (
                  <div key={idx} className="bg-slate-50 rounded-lg p-4 border border-slate-100">
                    <div className="font-bold text-slate-800">
                      {term.term}
                      {term.full && <span className="font-normal text-slate-500 text-sm ml-2">({term.full})</span>}
                    </div>
                    <p className="text-sm text-slate-600 mt-1">{term.definition}</p>
                    {term.example && (
                      <p className="text-xs text-slate-500 mt-2 italic border-t border-slate-200 pt-2">
                        Example: {term.example}
                      </p>
                    )}
                  </div>
                ))}
              </div>
            </section>
          ))}
        </div>
      );
    };

    // ==================== RENDER ====================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
