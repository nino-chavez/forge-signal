<html lang="en">
<head>

    <style>
        :root {
            --color-navy: #0f172a;
            --color-navy-light: #1e293b;
            --color-violet: #7c3aed;
            --color-violet-light: #a78bfa;
            --color-violet-dark: #5b21b6;
            --color-cyan: #06b6d4;
            --color-emerald: #10b981;
            --color-amber: #f59e0b;
            --color-rose: #f43f5e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--color-navy);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .slide {
            min-height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .animate-fade-up {
            animation: fadeSlideUp 0.8s ease-out forwards;
        }

        .animate-fade-in {
            animation: fadeIn 1s ease-out forwards;
        }

        .animate-pulse-glow {
            animation: pulseGlow 3s ease-in-out infinite;
        }

        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }
        .delay-600 { animation-delay: 0.6s; }
        .delay-700 { animation-delay: 0.7s; }

        .bg-grid {
            background-image:
                linear-gradient(rgba(124, 58, 237, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .bg-radial-gradient {
            background: radial-gradient(ellipse at 50% 0%, rgba(124, 58, 237, 0.15) 0%, transparent 50%);
        }

        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--color-violet), var(--color-cyan));
            z-index: 1000;
            transition: width 0.3s ease;
        }

        .nav-dots {
            position: fixed;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(124, 58, 237, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .nav-dot:hover {
            background: rgba(124, 58, 237, 0.6);
            transform: scale(1.2);
        }

        .nav-dot.active {
            background: var(--color-violet);
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.6);
        }

        .metric-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .metric-card:hover {
            border-color: rgba(124, 58, 237, 0.6);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.2);
        }

        .timeline-connector {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--color-violet), var(--color-cyan), transparent);
        }

        .deck-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }

        .deck-table th {
            background: rgba(124, 58, 237, 0.2);
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-violet-light);
        }

        .deck-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.1);
        }

        .deck-table tr:hover td {
            background: rgba(124, 58, 237, 0.05);
        }

        .deck-table th:first-child { border-radius: 8px 0 0 0; }
        .deck-table th:last-child { border-radius: 0 8px 0 0; }

        .journey-step {
            position: relative;
            padding: 16px;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 12px;
        }

        .journey-arrow {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-violet);
        }

        @media print {
            .slide { page-break-after: always; }
            .nav-dots, .progress-bar { display: none; }
        }
    </style>
</head>
