<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frid-AI-ys | BigCommerce Pilot Proposal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-navy: #0f172a;
            --color-navy-light: #1e293b;
            --color-violet: #7c3aed;
            --color-violet-light: #a78bfa;
            --color-violet-dark: #5b21b6;
            --color-cyan: #06b6d4;
            --color-emerald: #10b981;
            --color-amber: #f59e0b;
            --color-rose: #f43f5e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--color-navy);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .slide {
            min-height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .animate-fade-up {
            animation: fadeSlideUp 0.8s ease-out forwards;
        }

        .animate-fade-in {
            animation: fadeIn 1s ease-out forwards;
        }

        .animate-pulse-glow {
            animation: pulseGlow 3s ease-in-out infinite;
        }

        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }

        .bg-grid {
            background-image:
                linear-gradient(rgba(124, 58, 237, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .bg-radial-gradient {
            background: radial-gradient(ellipse at 50% 0%, rgba(124, 58, 237, 0.15) 0%, transparent 50%);
        }

        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--color-violet), var(--color-cyan));
            z-index: 1000;
            transition: width 0.3s ease;
        }

        .nav-dots {
            position: fixed;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(124, 58, 237, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .nav-dot:hover {
            background: rgba(124, 58, 237, 0.6);
            transform: scale(1.2);
        }

        .nav-dot.active {
            background: var(--color-violet);
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.6);
        }

        .metric-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .metric-card:hover {
            border-color: rgba(124, 58, 237, 0.6);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.2);
        }

        .deck-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }

        .deck-table th {
            background: rgba(124, 58, 237, 0.2);
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-violet-light);
        }

        .deck-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.1);
        }

        .deck-table tr:hover td {
            background: rgba(124, 58, 237, 0.05);
        }

        .deck-table th:first-child { border-radius: 8px 0 0 0; }
        .deck-table th:last-child { border-radius: 0 8px 0 0; }

        .tenet-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid rgba(124, 58, 237, 0.4);
            border-radius: 8px;
            font-size: 14px;
        }

        /* Print Styles */
        @media print {
            @page {
                size: landscape;
                margin: 0.5in;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            html {
                scroll-snap-type: none;
            }

            body {
                background: var(--color-navy) !important;
                -webkit-print-color-adjust: exact;
            }

            .slide {
                page-break-after: always;
                page-break-inside: avoid;
                min-height: 0;
                height: auto;
                padding: 40px;
                scroll-snap-align: none;
            }

            .slide:last-child {
                page-break-after: auto;
            }

            .nav-dots,
            .progress-bar {
                display: none !important;
            }

            /* Remove animations for print */
            .animate-fade-up,
            .animate-fade-in,
            .animate-pulse-glow {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
            }

            .delay-100, .delay-200, .delay-300, .delay-400, .delay-500 {
                animation-delay: 0s !important;
            }

            /* Hide decorative elements */
            .bg-radial-gradient {
                display: none;
            }

            .bg-grid {
                background-image: none;
            }

            /* Ensure content is visible */
            .glass {
                background: rgba(30, 41, 59, 0.9) !important;
                backdrop-filter: none;
            }

            .metric-card {
                background: rgba(30, 41, 59, 0.9) !important;
                border: 1px solid rgba(124, 58, 237, 0.5) !important;
            }

            /* Tables */
            .deck-table {
                font-size: 12px;
            }

            .deck-table th {
                background: rgba(124, 58, 237, 0.3) !important;
            }

            /* Hide hover effects */
            .metric-card:hover {
                transform: none;
                box-shadow: none;
            }

            /* Ensure text contrast */
            h1, h2, h3, h4, p, span, td, th, li {
                color: inherit !important;
            }

            /* Button styling for print */
            button {
                display: none;
            }
        }
    </style>
</head>

                ClosingSlide
            ];

            useEffect(() => {
                const handleScroll = () => {
                    if (!containerRef.current) return;
                    const scrollTop = window.scrollY;
                    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                    const scrollPercent = (scrollTop / docHeight) * 100;
                    setProgress(scrollPercent);

                    const slideHeight = window.innerHeight;
                    const newSlide = Math.round(scrollTop / slideHeight);
                    setCurrentSlide(Math.min(newSlide, slides.length - 1));
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, [slides.length]);

            const scrollToSlide = (index) => {
                window.scrollTo({
                    top: index * window.innerHeight,
                    behavior: 'smooth'
                });
            };

            return (
                <div ref={containerRef}>
                    <div className="progress-bar" style={{ width: `${progress}%` }}></div>

                    <div className="nav-dots">
                        {slides.map((_, index) => (
                            <button
                                key={index}
                                className={`nav-dot ${currentSlide === index ? 'active' : ''}`}
                                onClick={() => scrollToSlide(index)}
                                aria-label={`Go to slide ${index + 1}`}
                            />
                        ))}
                    </div>

                    {slides.map((SlideComponent, index) => (
                        <SlideComponent key={index} />
                    ))}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
