<html lang="en">
<head>

    tailwind.config = {
      theme: {
        extend: {
          colors: {

  <style>
    /* ==================== THEME SYSTEM ==================== */
    :root {
      /* Light Theme (Default) */
      --bg-page: #f8fafc;
      --bg-card: #ffffff;
      --bg-card-alt: #f1f5f9;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
    }

    /* Dark Theme */
    [data-theme="dark"] {
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-card-alt: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.4);
      --shadow-lg: 0 10px 15px rgba(0,0,0,0.5);
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* Dark mode overrides */
    [data-theme="dark"] .bg-white {
      background: var(--bg-card) !important;
    }
    [data-theme="dark"] .bg-slate-50,
    [data-theme="dark"] .bg-slate-100 {
      background: var(--bg-page) !important;
    }
    [data-theme="dark"] .text-slate-800,
    [data-theme="dark"] .text-slate-700,
    [data-theme="dark"] .text-slate-900 {
      color: var(--text-primary) !important;
    }
    [data-theme="dark"] .text-slate-600,
    [data-theme="dark"] .text-slate-500 {
      color: var(--text-secondary) !important;
    }
    [data-theme="dark"] .border-slate-200,
    [data-theme="dark"] .border-slate-300 {
      border-color: var(--border-color) !important;
    }

    /* Theme toggle */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .theme-btn {
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: rgba(255, 255, 255, 0.6);
      background: transparent;
      border: none;
    }
    .theme-btn:hover {
      color: white;
      background: rgba(255, 255, 255, 0.1);
    }
    .theme-btn.active {
      color: #004D2C;
      background: #C5A028;
      font-weight: 700;
    }

    /* Collapsible sections */
    .section-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease-out, opacity 0.3s ease;
      opacity: 0;
    }
    .section-content.expanded {
      max-height: 10000px;
      opacity: 1;
      transition: max-height 0.6s ease-in, opacity 0.3s ease;
    }

    /* Assessment cards */
    .assessment-card {
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: var(--shadow-md);
    }
    [data-theme="dark"] .assessment-card {
      background: #1e293b !important;
    }

    /* Dimension cards */
    .dimension-card {
      background: var(--bg-card);
    }
    [data-theme="dark"] .dimension-card {
      background: #1e293b !important;
    }
    .dimension-title { color: var(--text-primary); }
    .dimension-text { color: var(--text-secondary); }
    [data-theme="dark"] .dimension-title { color: #f1f5f9 !important; }
    [data-theme="dark"] .dimension-text { color: #94a3b8 !important; }

    /* Brand cards */
    .brand-card {
      background: var(--bg-card);
    }
    [data-theme="dark"] .brand-card {
      background: #1e293b !important;
    }
    .brand-title { color: var(--text-primary); }
    .brand-text { color: var(--text-secondary); }
    [data-theme="dark"] .brand-title { color: #f1f5f9 !important; }
    [data-theme="dark"] .brand-text { color: #94a3b8 !important; }

    /* Data domain cards */
    .data-card {
      background: var(--bg-card);
    }
    [data-theme="dark"] .data-card {
      background: #1e293b !important;
    }
    .data-title { color: var(--text-primary); }
    .data-text { color: var(--text-secondary); }
    .data-label { color: var(--text-muted); }
    [data-theme="dark"] .data-title { color: #f1f5f9 !important; }
    [data-theme="dark"] .data-text { color: #cbd5e1 !important; }
    [data-theme="dark"] .data-label { color: #94a3b8 !important; }

    /* Score indicators */
    .score-low { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
    .score-medium { background: #fef9c3; border-color: #fde047; color: #ca8a04; }
    .score-high { background: #dcfce7; border-color: #86efac; color: #16a34a; }
    [data-theme="dark"] .score-low { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3); color: #f87171; }
    [data-theme="dark"] .score-medium { background: rgba(234, 179, 8, 0.15); border-color: rgba(234, 179, 8, 0.3); color: #facc15; }
    [data-theme="dark"] .score-high { background: rgba(34, 197, 94, 0.15); border-color: rgba(34, 197, 94, 0.3); color: #4ade80; }

    /* Print styles */
    @media print {
      .no-print { display: none !important; }
      .section-content { max-height: none !important; opacity: 1 !important; }
    }
  </style>
</head>
