    /* Generic brand colors */
    .bg-brand-primary { background-color: #2563eb; }

    .bg-brand-accent { background-color: #f59e0b; }
    .text-brand-primary { color: #2563eb; }

    .border-brand-primary { border-color: #2563eb; }

    /* Section styling */
    .section-badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

      border: 1px solid rgba(255,255,255,0.1);

      border: 1px solid #e2e8f0;

      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    @keyframes flow-down {
      0%, 100% { opacity: 0.4; transform: translateY(-2px); }
      50% { opacity: 1; transform: translateY(2px); }
    }
    .animate-flow-down { animation: flow-down 1.5s ease-in-out infinite; }
    .view-content { max-width: 1400px; margin: 0 auto; }

    /* Reference banner */
    .reference-banner {
      background: #fef3c7;
      border-bottom: 2px solid #f59e0b;
      padding: 0.5rem 1.5rem;
      font-size: 0.8rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }
    .reference-banner strong { color: #92400e; }
    .reference-banner span { color: #78350f; }
    .reference-banner a { float: right; color: #92400e; }
    .main-content { padding-top: 48px; }

            { term: "AP2", full: "Agent Payments Protocol", definition: "Google's competing standard that lets AI agents make purchases with explicit user permission rules called 'mandates'. More focused on giving users fine-grained control.", example: "You could tell Gemini 'buy this TV if it drops below $800' and AP2 ensures that rule is followed." },
            { term: "MCP", full: "Model Context Protocol", definition: "Anthropic's open protocol for connecting LLMs to external tools, data sources, and services. The 'USB port' that lets any AI model plug into commerce systems.", example: "A Claude-powered agent uses MCP to query real-time inventory, pull customer profiles, and execute orders—all through standardized tool interfaces." },
            { term: "Mandate", definition: "A permission slip that tells an AI agent exactly what it's allowed to do. Like giving a friend a credit card with specific spending rules.", example: "Intent Mandate: 'Buy a TV under $1000'. Payment Mandate: 'Charge up to $999 to my Visa'." },
            { term: "SPT", full: "Stripe Payment Token", definition: "A secure, limited-use token that lets an AI agent charge a card without ever seeing the actual card number. Like a one-time-use gift card.", example: "ChatGPT gets an SPT that's only valid for this specific purchase, for this amount, at this merchant." },
            { term: "Delegated Payment", definition: "Letting an AI agent complete a purchase on a customer's behalf using a secure token, rather than entering card details directly.", example: "Instead of typing a card number, the customer approves the purchase in Stripe, and ChatGPT completes checkout." },
            { term: "HNP", full: "Human-Not-Present", definition: "A transaction where the AI agent acts autonomously based on pre-set rules, without the human actively watching. The AI shops while the customer sleeps.", example: "The agent monitors prices and buys automatically when conditions are met—customer is notified after." },
          ]
        },
        orchestration: {
          title: "Orchestration Terms",
          terms: [
            { term: "Agent Pattern", definition: "A design approach for how an AI agent reasons and acts. Patterns like ReAct, Reflection, and Planning provide reusable architectures for agent behavior.", example: "ReAct pattern: Think about what tool to use → Use it → Observe result → Think again → Repeat until done." },
            { term: "ReAct", full: "Reasoning and Acting", definition: "Pattern where agent iteratively reasons about actions, executes them, observes results, and adjusts. Combines chain-of-thought with tool use.", example: "Agent thinks 'I need inventory data' → calls inventory API → sees '5 in stock' → reasons about next step." },
            { term: "Reflection", definition: "Pattern where agent evaluates its own output and iteratively refines through self-critique until quality thresholds are met.", example: "Agent drafts response → critiques for accuracy → finds gap → revises → re-evaluates → approves." },
            { term: "Tool Calling", definition: "The ability for an LLM to invoke external functions/APIs during a conversation. The mechanism that makes agents 'agentic'.", example: "User asks 'Is this TV in stock near me?' → Agent calls check_inventory(sku, zip) tool → Returns real answer." },
            { term: "Guardrails", definition: "Safety systems that constrain what an AI agent can say or do—content filtering, PII protection, action limits, fraud detection.", example: "Guardrails prevent an agent from: revealing customer data, making purchases over $5000, or recommending competitor products." },
            { term: "Context Engine", definition: "Component that enriches each request with everything known about the customer—combining real-time session with historical data.", example: "You ask about laptops; Context Engine adds: past purchases, avg spend, preferred pickup method." },
          ]
        },
        aiml: {
          title: "AI/ML Terms",
          terms: [
            { term: "LLM", full: "Large Language Model", definition: "AI systems like ChatGPT or Claude that understand and generate human language. The 'brain' powering conversational AI.", example: "GPT-4, Claude, and Gemini are all LLMs that can understand 'I need a laptop for video editing'." },
            { term: "Embedding", definition: "Converting text, images, or products into lists of numbers that capture their meaning. Similar items have similar numbers, making search smarter.", example: "'MacBook Air' and 'lightweight laptop' have similar embeddings, so searching for one finds the other." },
            { term: "RAG", full: "Retrieval-Augmented Generation", definition: "Teaching AI to look up real information before answering, instead of just guessing. Like giving the AI a reference book.", example: "When asked about return policies, the AI retrieves the actual policy document before responding." },
            { term: "Hallucination", definition: "When AI confidently states something that isn't true. A major risk in commerce—the AI might invent product features.", example: "AI saying 'This TV has built-in speakers' when it doesn't. Could lead to returns and angry customers." },
            { term: "Groundedness", definition: "How well AI responses are based on actual data vs. made up. Grounded = factual. Ungrounded = potentially hallucinated.", example: "A grounded response cites the actual product specs. An ungrounded one makes assumptions." },
          ]
        },
        commerce: {
          title: "Commerce Terms",
          terms: [
            { term: "CDP", full: "Customer Data Platform", definition: "A system that collects all customer data into one unified profile—purchases, browsing, preferences, membership status.", example: "CDP knows you're a loyalty member who prefers Apple products and usually buys in the $800-1500 range." },
            { term: "PIM", full: "Product Information Management", definition: "The master system storing all product data—names, descriptions, specs, images, categories. The 'source of truth' for product info.", example: "When AI describes a MacBook's specs, that data comes from PIM." },
            { term: "ATP", full: "Available to Promise", definition: "Real-time inventory that's actually available to sell—accounting for what's reserved, in transit, or already sold.", example: "The website shows '5 in stock' because ATP calculated: 10 in warehouse - 3 reserved - 2 pending = 5 available." },

        },
