<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'msft-blue': '#0078D4',
            'msft-dark': '#004578',
            'msft-light': '#DEECF9',
            'msft-green': '#107C10',
            'msft-orange': '#D83B01',
            'msft-purple': '#5C2D91',
            'msft-yellow': '#FFB900',

  <style>
    body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

    /* Flow Animations */
    @keyframes flowRight {
      0%, 100% { opacity: 0.4; transform: translateX(-2px); }
      50% { opacity: 1; transform: translateX(2px); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 5px rgba(0, 120, 212, 0.3); }
      50% { box-shadow: 0 0 15px rgba(0, 120, 212, 0.6); }
    }
    .animate-flow-right { animation: flowRight 2s ease-in-out infinite; }
    .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }

    .flow-line {
      stroke-dasharray: 8 4;
      animation: dash 1s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -12; }
    }

    /* Legend badges */
    .badge-outsource { background: linear-gradient(135deg, #107C10, #0B5C0B); }
    .badge-retain { background: linear-gradient(135deg, #0078D4, #004578); }
    .badge-influence { background: linear-gradient(135deg, #5C2D91, #3B1961); }
    .badge-new { background: linear-gradient(135deg, #D83B01, #A62D01); }

    /* Component card styles */
    .component-card {
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .component-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    /* Print styles */
    @media print {
      @page { size: A3 landscape; margin: 0.5in; }
      body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .animate-flow-right, .flow-line, .animate-pulse-glow { animation: none !important; }
      .no-print { display: none !important; }
    }
  </style>
</head>
