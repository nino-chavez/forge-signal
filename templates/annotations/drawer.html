<!--
  Signal Forge — Annotations Drawer Component

  Reusable side-drawer for embedding section-level rationale in AI-generated documents.

  USAGE:
  1. Add class="annotated" data-note="sectionKey" to any <h2> you want annotated
  2. Define annotations in a JS object (see ANNOTATIONS_DATA below)
  3. Include this file's CSS in <style> and HTML/JS before </body>

  DESIGN PRINCIPLES:
  - Invisible by default. Document reads clean without annotations.
  - Accessible on demand. Click a section header to open the drawer.
  - Stripped on print. @media print hides all annotation UI.
  - Not auto-generated. Content must come from actual conversation context.

  See: docs/voice/content-taxonomy.md → Annotations Convention
-->

<!-- ============================================================
     HTML — paste before </body>
     ============================================================ -->

<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">&times;</button>
  <div class="drawer-label">Strategic Thinking</div>
  <div class="drawer-title" id="drawer-title"></div>
  <div id="drawer-body"></div>
</div>

<button class="drawer-toggle" onclick="document.querySelector('.annotated').click()">? Show strategic context</button>

<!-- ============================================================
     JS — paste before </body>

     Replace ANNOTATIONS_DATA with your document's annotations.
     Each key matches a data-note="key" attribute on an <h2>.

     Annotation schema:
     {
       title: string,           // "Why this section exists"
       body: string (HTML),     // Rationale paragraphs. Use <p> tags.
                                // End with <p class="origin">source info</p>
     }
     ============================================================ -->

<script>
// Replace this with your document's annotations
const ANNOTATIONS_DATA = {
  // example: {
  //   title: "Why this section exists",
  //   body: `<p>Rationale paragraph.</p>
  //          <p>Another paragraph explaining what changed and why.</p>
  //          <p class="origin">Source: conversation + API research.</p>`
  // }
};

function closeDrawer() {
  document.body.classList.remove('drawer-open');
  document.querySelectorAll('.annotated.active').forEach(el => el.classList.remove('active'));
}

document.querySelectorAll('.annotated').forEach(el => {
  el.addEventListener('click', () => {
    const key = el.dataset.note;
    const note = ANNOTATIONS_DATA[key];
    if (!note) return;

    document.querySelectorAll('.annotated.active').forEach(a => a.classList.remove('active'));
    el.classList.add('active');

    document.getElementById('drawer-title').textContent = note.title;
    document.getElementById('drawer-body').innerHTML = note.body;
    document.body.classList.add('drawer-open');
    document.getElementById('drawer').scrollTop = 0;
  });
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
</script>
